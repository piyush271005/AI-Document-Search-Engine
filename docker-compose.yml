version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: doc_search_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doc_search_backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_DB_DIR=/app/chroma_db
      - DEFAULT_LLM_PROVIDER=mock
    volumes:
      - chroma_data:/app/chroma_db
    depends_on:
      - redis
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: doc_search_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

volumes:
  redis_data:
  chroma_data:
