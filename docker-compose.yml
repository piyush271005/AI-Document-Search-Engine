version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docsense_backend
    ports:
      - "8000:8000"
    environment:
      - CHROMA_DB_DIR=/app/chroma_db
      - DEFAULT_LLM_PROVIDER=mock
    volumes:
      - chroma_data:/app/chroma_db
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: docsense_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

volumes:
  chroma_data:
